<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AL Master Flow - AI Study Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        
        :root {
            --bg-dark: #020617;
            --card-dark: #0f172a;
            --accent: #3b82f6;
            --ai-accent: #a855f7;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-dark);
            color: #f8fafc;
            overflow: hidden;
        }

        .glass {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .sidebar-item.active {
            background: linear-gradient(90deg, rgba(59, 130, 246, 0.15) 0%, rgba(59, 130, 246, 0) 100%);
            border-left: 4px solid var(--accent);
            color: var(--accent);
        }

        .tab-content { display: none; height: 100%; overflow-y: auto; padding-bottom: 120px; }
        .tab-content.active { display: block; animation: slideUp 0.3s ease-out; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .btn-primary {
            background: var(--accent);
            box-shadow: 0 4px 14px 0 rgba(59, 130, 246, 0.3);
            transition: all 0.2s;
        }
        
        .btn-ai {
            background: linear-gradient(135deg, #7c3aed 0%, #3b82f6 100%);
            box-shadow: 0 4px 14px 0 rgba(124, 58, 237, 0.4);
        }

        .card-stat {
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.4) 0%, rgba(15, 23, 42, 0.4) 100%);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .ai-shimmer {
            background: linear-gradient(90deg, transparent, rgba(168, 85, 247, 0.1), transparent);
            background-size: 200% 100%;
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        .loader {
            border: 2px solid #f3f3f3;
            border-top: 2px solid #3b82f6;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            animation: spin 1s linear infinite;
            display: inline-block;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="flex h-screen w-screen">

    <!-- Desktop Sidebar -->
    <aside class="hidden md:flex flex-col w-72 bg-slate-900/50 border-r border-slate-800/50 p-6 z-50">
        <div class="flex items-center gap-3 mb-10 px-2">
            <div class="w-10 h-10 bg-gradient-to-br from-blue-600 to-purple-600 rounded-2xl flex items-center justify-center shadow-lg">
                <i class="fas fa-bolt text-white text-xl"></i>
            </div>
            <span class="text-xl font-extrabold tracking-tight italic">AL MASTER <span class="text-blue-500">AI</span></span>
        </div>

        <nav class="flex-1 space-y-1 no-scrollbar overflow-y-auto">
            <button onclick="switchTab('dashboard')" class="sidebar-item active flex items-center gap-4 w-full p-4 rounded-xl transition hover:bg-slate-800/50 text-sm font-semibold">
                <i class="fas fa-house-chimney w-5"></i> Dashboard
            </button>
            <button onclick="switchTab('lessons')" class="sidebar-item flex items-center gap-4 w-full p-4 rounded-xl transition hover:bg-slate-800/50 text-sm font-semibold">
                <i class="fas fa-book-open-reader w-5"></i> Lessons
            </button>
            <button onclick="switchTab('equations')" class="sidebar-item flex items-center gap-4 w-full p-4 rounded-xl transition hover:bg-slate-800/50 text-sm font-semibold">
                <i class="fas fa-atom w-5"></i> Equations
            </button>
            <button onclick="switchTab('definitions')" class="sidebar-item flex items-center gap-4 w-full p-4 rounded-xl transition hover:bg-slate-800/50 text-sm font-semibold">
                <i class="fas fa-language w-5"></i> Definitions
            </button>
            <button onclick="switchTab('flashcards')" class="sidebar-item flex items-center gap-4 w-full p-4 rounded-xl transition hover:bg-slate-800/50 text-sm font-semibold">
                <i class="fas fa-clone w-5"></i> Flashcards
            </button>
            <button onclick="switchTab('papers')" class="sidebar-item flex items-center gap-4 w-full p-4 rounded-xl transition hover:bg-slate-800/50 text-sm font-semibold">
                <i class="fas fa-clipboard-check w-5"></i> Papers
            </button>
            <button onclick="switchTab('pomodoro')" class="sidebar-item flex items-center gap-4 w-full p-4 rounded-xl transition hover:bg-slate-800/50 text-sm font-semibold">
                <i class="fas fa-hourglass-half w-5"></i> Pomodoro

        <button onclick="switchTab('settings')" class="sidebar-item flex items-center gap-4 w-full p-4 rounded-xl transition hover:bg-slate-800/50 text-sm font-semibold mt-4">
            <i class="fas fa-gear w-5"></i> Settings

    </aside>

    <!-- Main Content Area -->
    <main class="flex-1 relative flex flex-col min-w-0 bg-slate-950">
        
        <!-- Header -->
        <header class="h-16 flex items-center justify-between px-8 border-b border-slate-900/50 glass z-40">

            <div id="auth-status" class="flex items-center gap-4">

                    <i class="fas fa-microphone text-blue-400"></i> AI Summary ✨

        </header>

        <!-- Dynamic Content -->
        <div class="flex-1 overflow-hidden px-4 md:px-8 py-6">
            
            <!-- Dashboard Tab -->
            <div id="tab-dashboard" class="tab-content active space-y-6">
                <div class="grid grid-cols-1 lg:grid-cols-4 gap-4">
                    <div class="card-stat p-6 rounded-3xl col-span-1 lg:col-span-2 flex flex-col justify-between h-48 relative overflow-hidden">
                        <div class="z-10">
                            <p class="text-xs font-bold text-slate-500 uppercase tracking-widest">සමස්ත ප්‍රගතිය</p>
                            <h3 id="total-progress-text" class="text-5xl font-black mt-2">0%</h3>
                        </div>
                        <div class="w-full bg-slate-800 h-2 rounded-full overflow-hidden z-10">

                    </div>
                    <div class="card-stat p-6 rounded-3xl flex flex-col justify-center items-center text-center">
                        <p class="text-xs font-bold text-slate-500 mb-2 uppercase">අද අධ්‍යයන කාලය</p>
                        <h3 id="dash-work-time" class="text-3xl font-black font-mono">00:00:00</h3>
                    </div>
                    <div class="card-stat p-6 rounded-3xl flex flex-col justify-center items-center text-center border-t-2 border-green-500/20">
                        <p class="text-xs font-bold text-slate-500 mb-2 uppercase">පේපර්ස් සාමාන්‍යය</p>
                        <h3 id="dash-paper-avg" class="text-3xl font-black text-green-400">0%</h3>
                    </div>

                <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">

                    <div class="space-y-6">
                        <div class="card-stat p-6 rounded-3xl relative overflow-hidden">
                            <h4 class="text-sm font-bold text-slate-400 mb-4">Focus Analyzer</h4>
                            <div id="pomo-stats" class="space-y-4">
                                <div class="flex justify-between items-center text-sm">
                                    <span class="text-slate-500">සම්පූර්ණ සෙෂන්</span>

                                </div>
                                <div class="flex justify-between items-center text-sm">
                                    <span class="text-slate-500">මුළු කාලය</span>
                                    <span id="pomo-total-time" class="font-black">0h</span>
                                </div>
                            </div>
                        </div>
                        <div id="ai-chat-preview" class="glass p-5 rounded-3xl border border-purple-500/20">
                            <p class="text-xs font-bold text-purple-400 mb-2 uppercase">AI Mentor Assistant ✨</p>
                            <p class="text-[11px] text-slate-400 italic mb-4">"ඕනෑම විෂය කරුණක් අහන්න, මම පැහැදිලි කරන්නම්."</p>
                            <input type="text" id="ai-quick-query" placeholder="Eg: ශක්ති සංස්ථිති නියමය කියන්නේ මොකක්ද?" class="w-full bg-slate-900/50 border border-slate-800 p-2.5 rounded-xl text-xs outline-none focus:border-purple-500">
                            <button onclick="askAIQuick()" class="w-full mt-2 btn-ai py-2 rounded-xl text-[10px] font-black uppercase">Ask AI Assistant ✨</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Lessons Tab -->
            <div id="tab-lessons" class="tab-content space-y-6">
                <div class="glass p-6 rounded-3xl flex flex-wrap gap-4 items-end">
                    <div class="flex-1 min-w-[200px] space-y-2">
                        <label class="text-xs font-bold text-slate-500">නව පාඩම</label>
                        <input id="lesson-title" type="text" class="w-full bg-slate-900 border border-slate-800 p-3 rounded-xl outline-none focus:border-blue-500" placeholder="උදා: තාප ගති විද්‍යාව">
                    </div>
                    <div class="w-40 space-y-2">

                    <button onclick="addLesson()" class="btn-primary h-12 px-8 rounded-xl font-bold">Add</button>

                         Smart Breakdown ✨

                    <input id="eq-formula" class="flex-1 min-w-[200px] bg-slate-900 border border-slate-800 p-3 rounded-xl outline-none font-mono" placeholder="Formula (LaTeX/Plain Text)">

                        <button onclick="document.getElementById('flash-modal').classList.remove('hidden')" class="btn-primary px-4 py-2 rounded-xl text-xs font-bold">Manual New</button>
                    </div>
                </div>
                <div id="flashcards-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
            </div>

            <!-- Pomodoro & Other Tabs placeholders -->
            <div id="tab-definitions" class="tab-content"> <div id="definitions-list" class="grid grid-cols-1 md:grid-cols-2 gap-4 pt-6"></div> </div>
            <div id="tab-papers" class="tab-content"> <div id="papers-list" class="space-y-3 pt-6"></div> </div>
            <div id="tab-pomodoro" class="tab-content flex flex-col items-center justify-center space-y-12">
                <div id="timer-text" class="text-9xl font-black font-mono tracking-tighter">25:00</div>
                <div class="flex gap-4">
                    <button onclick="toggleTimer()" id="pomo-start-btn" class="btn-primary px-16 py-4 rounded-2xl text-xl font-black uppercase">Start Session</button>
                </div>
            </div>

            <!-- Settings Tab -->
            <div id="tab-settings" class="tab-content max-w-2xl mx-auto space-y-8 pt-10">
                <div class="glass p-8 rounded-[40px] text-center space-y-6">
                    <h3 class="text-2xl font-black">Account & Cloud Sync</h3>
                    <button id="google-login-btn" onclick="handleLogin()" class="w-full bg-white text-black py-4 rounded-2xl font-bold flex items-center justify-center gap-3">
                        <i class="fab fa-google"></i> Continue with Google
                    </button>
                </div>
                <div class="glass p-8 rounded-[40px] space-y-6">
                    <h3 class="text-xl font-black">Subjects</h3>
                    <div id="subject-list" class="space-y-2"></div>
                </div>
            </div>
        </div>

        <!-- Mobile Nav -->
        <nav class="md:hidden fixed bottom-6 left-6 right-6 h-18 glass rounded-[30px] flex items-center justify-around px-2 z-50 shadow-2xl border border-white/5">
            <button onclick="switchTab('dashboard')" class="w-12 h-12 flex items-center justify-center"><i class="fas fa-house"></i></button>
            <button onclick="switchTab('lessons')" class="w-12 h-12 flex items-center justify-center"><i class="fas fa-book"></i></button>
            <button onclick="switchTab('flashcards')" class="w-12 h-12 flex items-center justify-center"><i class="fas fa-clone"></i></button>
            <button onclick="switchTab('settings')" class="w-12 h-12 flex items-center justify-center"><i class="fas fa-gear"></i></button>
        </nav>
    </main>

    <!-- AI Output Modal -->
    <div id="ai-modal" class="fixed inset-0 bg-black/90 flex items-center justify-center z-[200] hidden p-6">
        <div class="glass max-w-2xl w-full p-8 rounded-[40px] max-h-[80vh] overflow-y-auto space-y-6 relative border-t-4 border-purple-500">
            <button onclick="document.getElementById('ai-modal').classList.add('hidden')" class="absolute top-6 right-6 text-slate-500 hover:text-white"><i class="fas fa-times"></i></button>
            <h2 id="ai-modal-title" class="text-2xl font-black flex items-center gap-2">AI Insights ✨</h2>
            <div id="ai-modal-content" class="text-slate-300 leading-relaxed text-sm whitespace-pre-wrap"></div>
            <div id="ai-modal-actions" class="flex gap-4"></div>
        </div>
    </div>

    <!-- Scripts -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot, collection, query, addDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const apiKey = "";
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : "udara-al-master-ai";

        let user = null;
        let userData = {
            subjects: ["Physics", "Chemistry", "Combined Maths"],
            lessons: [],
            equations: [],
            flashcards: [],
            papers: [],
            pomoSessions: []
        };

        // --- Auth Setup ---
        const initAuth = async () => {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
            } else {
                await signInAnonymously(auth);
            }
        };
        initAuth();

        onAuthStateChanged(auth, (u) => {
            user = u;
            if (u) {
                document.getElementById('user-profile').classList.remove('hidden');
                document.getElementById('user-img').src = u.photoURL || `https://ui-avatars.com/api/?name=${u.displayName || 'User'}`;
                setupDataListener();
            }
        });

        function setupDataListener() {
            if (!user) return;
            const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'data', 'master');
            onSnapshot(docRef, (snap) => {
                if (snap.exists()) {
                    userData = snap.data();
                    renderAll();
                } else {
                    saveToCloud();
                }
            }, (err) => console.error(err));
        }

        async function saveToCloud() {
            if (!user) return;
            const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'data', 'master');
            await setDoc(docRef, userData);
        }

        // --- Gemini AI Integration ---
        async function callGemini(prompt, systemPrompt = "You are a helpful A/L educational assistant in Sri Lanka. Help the student with their studies. Respond in Sinhala but use English for technical terms.") {
            let retries = 5;
            let delay = 1000;
            
            while (retries > 0) {
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }],
                            systemInstruction: { parts: [{ text: systemPrompt }] }
                        })
                    });
                    const data = await response.json();
                    return data.candidates[0].content.parts[0].text;
                } catch (e) {
                    retries--;
                    await new Promise(r => setTimeout(r, delay));
                    delay *= 2;
                }
            }
            throw new Error("AI connection failed");
        }

        // --- AI TTS ---
        window.generateDailySummary = async () => {
            const btn = document.querySelector('[onclick="generateDailySummary()"]');
            btn.innerHTML = '<div class="loader"></div> Processing...';
            
            const summaryText = `I am ${user?.displayName || 'Student'}. My current progress is ${Math.round((userData.lessons.filter(l => l.completed).length / (userData.lessons.length || 1)) * 100)}%. Suggest what I should study next.`;
            
            try {
                const aiResponse = await callGemini(summaryText, "Generate a very brief, encouraging daily voice summary for a student in Sinhala. Keep it under 50 words.");
                
                const ttsResponse = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Say in a warm, encouraging voice: ${aiResponse}` }] }],
                        generationConfig: { 
                            responseModalities: ["AUDIO"],
                            speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Kore" } } } 
                        }
                    })
                });
                
                const ttsData = await ttsResponse.json();
                const audioBase64 = ttsData.candidates[0].content.parts[0].inlineData.data;
                playPCM(audioBase64);
            } catch (e) {
                console.error(e);
            } finally {
                btn.innerHTML = '<i class="fas fa-microphone text-blue-400"></i> AI Summary ✨';
            }
        };

        function playPCM(base64) {
            const binary = atob(base64);
            const array = new Uint8Array(binary.length);
            for (let i = 0; i < binary.length; i++) array[i] = binary.charCodeAt(i);
            const blob = new Blob([array], { type: 'audio/wav' }); // Environment handles L16 conversion logic usually or simpler to play via standard means if wrapped
            const url = URL.createObjectURL(blob);
            const audio = new Audio(url);
            audio.play();
        }

        // --- AI Features ---
        window.aiBreakdownLesson = async () => {
            const title = document.getElementById('lesson-title').value;
            if (!title) return alert("Please enter a lesson name first!");
            
            showAIModal("Breaking down Lesson...", '<div class="flex justify-center p-12"><div class="loader scale-150"></div></div>');
            
            try {
                const prompt = `Break down the A/L lesson "${title}" into 5 logical sub-lessons. Return only a JSON array of strings like ["Sub 1", "Sub 2"]. No other text.`;
                const aiResult = await callGemini(prompt, "You are a curriculum expert. Provide output in JSON format only.");
                const subLessons = JSON.parse(aiResult.replace(/```json|```/g, '').trim());
                
                let content = `I've broken down **${title}** for you:\n\n`;
                subLessons.forEach(s => content += `- ${s}\n`);
                
                showAIModal(`Breakdown for ${title}`, content, `
                    <button id="apply-ai" class="btn-ai px-6 py-2 rounded-xl text-xs font-bold">Apply to my List ✨</button>
                `);
                
                document.getElementById('apply-ai').onclick = () => {
                    subLessons.forEach(s => {
                        userData.lessons.push({ id: Date.now() + Math.random(), title: s, subject: document.getElementById('lesson-subject').value, completed: false });
                    });
                    saveToCloud();
                    document.getElementById('ai-modal').classList.add('hidden');
                };
            } catch (e) {
                showAIModal("Error", "Could not connect to AI. Check your internet.");
            }
        };

        window.aiGenerateFlashcards = async () => {
            if (userData.lessons.length === 0) return alert("Add some lessons first!");
            showAIModal("Generating Flashcards ✨", '<div class="flex justify-center p-12"><div class="loader scale-150"></div></div>');
            
            try {
                const lastLesson = userData.lessons[userData.lessons.length - 1].title;
                const prompt = `Create 3 flashcards (Question/Answer pairs) for the A/L topic "${lastLesson}". Return as JSON: [{"q": "...", "a": "..."}]. Keep it simple and in Sinhala.`;
                const res = await callGemini(prompt, "Output JSON only.");
                const cards = JSON.parse(res.replace(/```json|```/g, '').trim());
                
                let content = `Generated cards for **${lastLesson}**:\n\n`;
                cards.forEach(c => content += `Q: ${c.q}\nA: ${c.a}\n---\n`);
                
                showAIModal("Flashcards Ready", content, `<button id="add-cards" class="btn-ai px-6 py-2 rounded-xl text-xs font-bold">Add to Deck ✨</button>`);
                
                document.getElementById('add-cards').onclick = () => {
                    cards.forEach(c => {
                        userData.flashcards.push({ id: Date.now() + Math.random(), q: c.q, a: c.a, subject: userData.subjects[0] });
                    });
                    saveToCloud();
                    document.getElementById('ai-modal').classList.add('hidden');
                };
            } catch (e) { console.error(e); }
        };

        window.askAIQuick = async () => {
            const queryText = document.getElementById('ai-quick-query').value;
            if (!queryText) return;
            const btn = document.querySelector('[onclick="askAIQuick()"]');
            btn.innerHTML = '<div class="loader"></div> Thinking...';
            
            try {
                const answer = await callGemini(queryText);
                showAIModal("AI Quick Answer ✨", answer);
            } catch (e) { alert("AI Error"); }
            finally { 
                btn.innerHTML = "Ask AI Assistant ✨";
                document.getElementById('ai-quick-query').value = '';
            }
        };

        // --- Core Functions ---
        window.switchTab = (tabId) => {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + tabId).classList.add('active');
            document.getElementById('current-tab-title').innerText = tabId;
        };

        function showAIModal(title, content, actions = '') {
            const modal = document.getElementById('ai-modal');
            document.getElementById('ai-modal-title').innerText = title;
            document.getElementById('ai-modal-content').innerHTML = content;
            document.getElementById('ai-modal-actions').innerHTML = actions;
            modal.classList.remove('hidden');
        }

        window.addLesson = () => {
            const title = document.getElementById('lesson-title').value;
            const sub = document.getElementById('lesson-subject').value;
            if(!title) return;
            userData.lessons.push({ id: Date.now(), title, subject: sub, completed: false });
            saveToCloud();
        };

        function renderAll() {
            renderDashboard();
            renderLessons();
            renderFlashcards();
            updateDropdowns();
            renderSettings();
        }

        function updateDropdowns() {
            const el = document.getElementById('lesson-subject');
            if(el) el.innerHTML = userData.subjects.map(s => `<option value="${s}">${s}</option>`).join('');
        }

        function renderDashboard() {
            const comp = userData.lessons.filter(l => l.completed).length;
            const total = userData.lessons.length || 1;
            const pct = Math.round((comp / total) * 100);
            document.getElementById('total-progress-text').innerText = pct + "%";
            document.getElementById('total-progress-bar').style.width = pct + "%";
            
            // Render basic suggestions based on uncompleted items
            const sugBox = document.getElementById('dashboard-suggestions');
            const unDone = userData.lessons.filter(l => !l.completed).slice(0, 4);
            sugBox.innerHTML = unDone.map(l => `
                <div class="glass p-4 rounded-2xl border-l-4 border-blue-500 flex justify-between items-center ai-shimmer">
                    <div>
                        <p class="text-[10px] text-blue-400 font-bold uppercase">${l.subject}</p>
                        <p class="text-sm font-bold">${l.title}</p>
                    </div>
                </div>
            `).join('') || '<p class="text-xs text-slate-500">No pending lessons!</p>';
        }

        function renderLessons() {
            const grid = document.getElementById('lessons-grid');
            grid.innerHTML = userData.subjects.map(sub => {
                const list = userData.lessons.filter(l => l.subject === sub);
                return `
                    <div class="space-y-4">
                        <h4 class="text-xs font-black text-slate-500 border-b border-slate-800 pb-2">${sub.toUpperCase()}</h4>
                        ${list.map(l => `
                            <div class="card-stat p-4 rounded-2xl flex justify-between items-center">
                                <span class="text-sm font-bold ${l.completed ? 'line-through text-slate-500' : ''}">${l.title}</span>
                                <button onclick="toggleLesson(${l.id})" class="${l.completed ? 'text-green-500' : 'text-slate-700'}">
                                    <i class="fas fa-circle-check"></i>
                                </button>
                            </div>
                        `).join('')}
                    </div>
                `;
            }).join('');
        }

        window.toggleLesson = (id) => {
            const idx = userData.lessons.findIndex(l => l.id === id);
            userData.lessons[idx].completed = !userData.lessons[idx].completed;
            saveToCloud();
        };

        function renderFlashcards() {
            const cont = document.getElementById('flashcards-container');
            cont.innerHTML = userData.flashcards.map(f => `
                <div class="h-40 glass rounded-3xl p-6 flex flex-col justify-center text-center cursor-pointer hover:border-purple-500 transition border border-transparent" onclick="this.innerText = this.innerText == '${f.q}' ? '${f.a}' : '${f.q}'">
                    <p class="text-[10px] text-purple-400 font-bold mb-2">${f.subject}</p>
                    <p class="font-bold">${f.q}</p>
                </div>
            `).join('');
        }

        function renderSettings() {
            const list = document.getElementById('subject-list');
            list.innerHTML = userData.subjects.map(s => `
                <div class="p-3 glass rounded-xl flex justify-between items-center">
                    <span class="text-sm font-bold">${s}</span>
                </div>
            `).join('');
        }

        // --- Init ---
        renderAll();

    </script>
</body>
</html>
