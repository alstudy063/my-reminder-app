<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Pomodoro Timer — Focus Flow</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
    }

    body {
      min-height: 100vh;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* Main Card */
    .timer-card {
      width: min(90vmin, 700px);
      background: rgba(10, 10, 20, 0.65);
      backdrop-filter: blur(12px);
      border-radius: 3rem;
      padding: 1.5rem 1.8rem 2rem;
      box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.05);
      transition: all 0.2s ease;
    }

    /* Header stats row */
    .stats-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      flex-wrap: wrap;
      gap: 12px;
    }

    .stat-cards {
      display: flex;
      gap: 1rem;
    }

    .stat-card {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 1.8rem;
      padding: 0.5rem 1rem;
      backdrop-filter: blur(4px);
      transition: background 0.2s;
    }

    .stat-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #aaa;
      font-weight: 500;
    }

    .stat-value {
      font-size: 1.4rem;
      font-weight: 700;
      color: white;
      line-height: 1.2;
    }

    /* settings gear */
    .gear-btn {
      background: rgba(255, 255, 255, 0.05);
      border: none;
      width: 44px;
      height: 44px;
      border-radius: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
      color: #ccc;
    }
    .gear-btn:hover, .gear-btn:active {
      background: rgba(255, 255, 255, 0.15);
      color: white;
      transform: scale(0.96);
    }

    /* Circular timer */
    .circle-wrapper {
      display: flex;
      justify-content: center;
      margin: 0.8rem 0;
    }
    .circle {
      position: relative;
      width: 72%;
      max-width: 280px;
      aspect-ratio: 1 / 1;
    }
    .circle svg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
    }
    .inner-content {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .timer-digits {
      font-size: clamp(2.6rem, 11vw, 4.8rem);
      font-weight: 700;
      color: white;
      letter-spacing: 2px;
      line-height: 1;
    }
    .mode-label {
      font-size: 0.9rem;
      color: #ff6b4a;
      font-weight: 500;
      margin-top: 0.5rem;
      background: rgba(255, 107, 74, 0.12);
      padding: 0.2rem 0.9rem;
      border-radius: 40px;
      display: inline-block;
    }

    /* breathing animation when running */
    .timer-card.running .inner-content {
      animation: softBreath 2.5s ease-in-out infinite;
    }
    @keyframes softBreath {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }

    /* mode toggle buttons */
    .mode-toggles {
      display: flex;
      justify-content: center;
      gap: 0.8rem;
      margin: 1.8rem 0 1.5rem;
      flex-wrap: wrap;
    }
    .mode-btn {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 0.5rem 1.2rem;
      border-radius: 60px;
      font-size: 0.85rem;
      font-weight: 500;
      color: #ddd;
      cursor: pointer;
      transition: all 0.2s;
    }
    .mode-btn.active {
      background: #ff3b3b;
      border-color: #ff3b3b;
      color: white;
      box-shadow: 0 0 10px rgba(255, 59, 59, 0.3);
    }
    .mode-btn:active {
      transform: scale(0.94);
    }

    /* main control row */
    .control-row {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 1.5rem;
      margin-top: 0.5rem;
    }
    .ctrl-btn {
      background: rgba(255, 255, 255, 0.06);
      border: none;
      width: 52px;
      height: 52px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s ease;
      color: #eee;
    }
    .ctrl-btn:active {
      transform: scale(0.92);
      background: rgba(255, 255, 255, 0.15);
    }
    .play-btn {
      background: #ff3b3b;
      width: 72px;
      height: 72px;
      box-shadow: 0 0 12px rgba(255, 59, 59, 0.4);
    }
    .play-btn:active {
      background: #ff5c5c;
    }
    svg {
      width: 28px;
      height: 28px;
      stroke-width: 1.8;
    }
    .play-btn svg {
      width: 34px;
      height: 34px;
    }

    /* Settings Modal */
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      visibility: hidden;
      opacity: 0;
      transition: visibility 0.2s, opacity 0.2s;
    }
    .modal.open {
      visibility: visible;
      opacity: 1;
    }
    .modal-content {
      background: #111216;
      border-radius: 2rem;
      width: 90%;
      max-width: 360px;
      padding: 1.8rem;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 30px 40px rgba(0, 0, 0, 0.5);
    }
    .modal-content h3 {
      font-size: 1.6rem;
      color: white;
      margin-bottom: 1.2rem;
    }
    .setting-item {
      margin-bottom: 1.2rem;
    }
    .setting-item label {
      display: block;
      font-size: 0.8rem;
      color: #aaa;
      margin-bottom: 0.3rem;
    }
    .setting-item input {
      width: 100%;
      background: #1e1e2a;
      border: 1px solid #2c2c3a;
      padding: 0.6rem 0.8rem;
      border-radius: 1rem;
      color: white;
      font-size: 1rem;
      outline: none;
    }
    .modal-actions {
      display: flex;
      gap: 1rem;
      margin-top: 1.8rem;
    }
    .modal-actions button {
      flex: 1;
      background: #2c2c3a;
      border: none;
      padding: 0.7rem;
      border-radius: 2rem;
      color: white;
      font-weight: 500;
      cursor: pointer;
      transition: 0.1s linear;
    }
    .modal-actions button:first-child {
      background: #ff3b3b;
    }
    .modal-actions button:active {
      transform: scale(0.96);
    }

    /* confetti */
    .confetti {
      position: fixed;
      width: 8px;
      height: 12px;
      background: #ff3b3b;
      top: -20px;
      pointer-events: none;
      z-index: 2000;
      animation: fall linear forwards;
    }
    @keyframes fall {
      to {
        transform: translateY(110vh) rotate(720deg);
        opacity: 0;
      }
    }

    /* responsive touches */
    @media (max-width: 500px) {
      .timer-card {
        padding: 1rem 1.2rem 1.5rem;
      }
      .ctrl-btn {
        width: 46px;
        height: 46px;
      }
      .play-btn {
        width: 64px;
        height: 64px;
      }
      .stat-value {
        font-size: 1.1rem;
      }
    }
  </style>
</head>
<body>
  <div class="timer-card" id="timerCard">
    <!-- Header stats + gear -->
    <div class="stats-row">
      <div class="stat-cards">
        <div class="stat-card">
          <div class="stat-label">Focus time</div>
          <div class="stat-value" id="focusTimeDisplay">0h 0m</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Sessions</div>
          <div class="stat-value" id="sessionDisplay">0/0</div>
        </div>
      </div>
      <button class="gear-btn" id="settingsBtn">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H5.78a1.65 1.65 0 0 0-1.51 1 1.65 1.65 0 0 0 .33 1.82l.04.04A10 10 0 0 0 12 17.66a10 10 0 0 0 6.36-2.62l.04-.04z"></path>
        </svg>
      </button>
    </div>

    <!-- Circular timer -->
    <div class="circle-wrapper">
      <div class="circle">
        <svg viewBox="0 0 260 260">
          <circle cx="130" cy="130" r="120" stroke="rgba(255,255,255,0.12)" stroke-width="8" fill="none" />
          <circle id="progressRing" cx="130" cy="130" r="120" stroke="#ff3b3b" stroke-width="8" fill="none"
            stroke-linecap="round" stroke-dasharray="754" stroke-dashoffset="0" />
        </svg>
        <div class="inner-content" id="innerCircle">
          <div class="timer-digits" id="timerDisplay">25:00</div>
          <div class="mode-label" id="modeLabel">FOCUS</div>
        </div>
      </div>
    </div>

    <!-- Mode toggles -->
    <div class="mode-toggles">
      <button data-mode="focus" class="mode-btn active">Focus</button>
      <button data-mode="shortBreak" class="mode-btn">Short Break</button>
      <button data-mode="longBreak" class="mode-btn">Long Break</button>
    </div>

    <!-- Control buttons -->
    <div class="control-row">
      <button class="ctrl-btn" id="skipBackBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 8v8l-4-4 4-4zm6 0v8l-4-4 4-4z" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <button class="ctrl-btn play-btn" id="startPauseBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M8 5v14l11-7z" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <button class="ctrl-btn" id="skipForwardBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 8v8l4-4-4-4zm-6 0v8l4-4-4-4z" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Settings Modal -->
  <div id="settingsModal" class="modal">
    <div class="modal-content">
      <h3>Timer settings</h3>
      <div class="setting-item">
        <label>Focus (minutes)</label>
        <input type="number" id="focusInput" value="25" min="1" max="180">
      </div>
      <div class="setting-item">
        <label>Short break (minutes)</label>
        <input type="number" id="shortInput" value="5" min="1" max="60">
      </div>
      <div class="setting-item">
        <label>Long break (minutes)</label>
        <input type="number" id="longInput" value="15" min="1" max="90">
      </div>
      <div class="setting-item">
        <label>Sessions before long break</label>
        <input type="number" id="sessionsBeforeLongInput" value="4" min="1" max="12">
      </div>
      <div class="modal-actions">
        <button id="saveSettingsBtn">Save</button>
        <button id="closeModalBtn">Cancel</button>
      </div>
    </div>
  </div>

  <script>
    (function() {
      // ---------- DOM elements ----------
      const timerDisplay = document.getElementById('timerDisplay');
      const modeLabelSpan = document.getElementById('modeLabel');
      const focusTimeDisplay = document.getElementById('focusTimeDisplay');
      const sessionDisplaySpan = document.getElementById('sessionDisplay');
      const startPauseBtn = document.getElementById('startPauseBtn');
      const skipBackBtn = document.getElementById('skipBackBtn');
      const skipForwardBtn = document.getElementById('skipForwardBtn');
      const progressRing = document.getElementById('progressRing');
      const timerCard = document.getElementById('timerCard');
      const settingsBtn = document.getElementById('settingsBtn');
      const modal = document.getElementById('settingsModal');
      const closeModal = document.getElementById('closeModalBtn');
      const saveSettings = document.getElementById('saveSettingsBtn');
      const focusInput = document.getElementById('focusInput');
      const shortInput = document.getElementById('shortInput');
      const longInput = document.getElementById('longInput');
      const sessionsBeforeLongInput = document.getElementById('sessionsBeforeLongInput');
      const modeBtns = document.querySelectorAll('.mode-btn');

      // ---------- Constants & state ----------
      const CIRCUMFERENCE = 2 * Math.PI * 120; // ~753.98
      progressRing.style.strokeDasharray = CIRCUMFERENCE;
      
      let currentMode = 'focus';       // 'focus', 'shortBreak', 'longBreak'
      let timeLeft = 25 * 60;          // seconds
      let timerInterval = null;
      let isRunning = false;
      
      // stats
      let totalFocusMinutes = 0;        // accumulated focus minutes
      let completedSessions = 0;        // number of finished focus sessions
      let sessionsTarget = 4;            // sessions before long break
      
      // durations (in seconds)
      let durations = {
        focus: 25 * 60,
        shortBreak: 5 * 60,
        longBreak: 15 * 60
      };
      
      // ---------- helper functions ----------
      function formatTime(seconds) {
        const mins = Math.floor(seconds / 60);
        const secs = seconds % 60;
        return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
      }
      
      function updateUI() {
        timerDisplay.textContent = formatTime(timeLeft);
        let totalDuration = durations[currentMode];
        let offset = CIRCUMFERENCE - (timeLeft / totalDuration) * CIRCUMFERENCE;
        if (isNaN(offset)) offset = 0;
        progressRing.style.strokeDashoffset = offset;
        
        // update header stats
        const hours = Math.floor(totalFocusMinutes / 60);
        const mins = totalFocusMinutes % 60;
        focusTimeDisplay.textContent = `${hours}h ${mins}m`;
        sessionDisplaySpan.textContent = `${completedSessions}/${sessionsTarget}`;
        
        // mode label
        if (currentMode === 'focus') modeLabelSpan.textContent = 'FOCUS';
        else if (currentMode === 'shortBreak') modeLabelSpan.textContent = 'SHORT BREAK';
        else modeLabelSpan.textContent = 'LONG BREAK';
      }
      
      function switchMode(mode, resetTimerValue = true) {
        if (isRunning) pauseTimer();
        currentMode = mode;
        if (resetTimerValue) {
          timeLeft = durations[currentMode];
        }
        // update active mode button style
        modeBtns.forEach(btn => {
          if (btn.dataset.mode === currentMode) btn.classList.add('active');
          else btn.classList.remove('active');
        });
        updateUI();
      }
      
      function startTimer() {
        if (timerInterval) clearInterval(timerInterval);
        isRunning = true;
        timerCard.classList.add('running');
        timerInterval = setInterval(() => {
          if (timeLeft <= 0) {
            // timer finished
            clearInterval(timerInterval);
            timerInterval = null;
            isRunning = false;
            timerCard.classList.remove('running');
            updatePlayPauseIcon(false);
            handleSessionComplete();
          } else {
            timeLeft--;
            updateUI();
          }
        }, 1000);
      }
      
      function pauseTimer() {
        if (timerInterval) {
          clearInterval(timerInterval);
          timerInterval = null;
        }
        isRunning = false;
        timerCard.classList.remove('running');
        updatePlayPauseIcon(false);
      }
      
      function resetCurrentTimer() {
        if (isRunning) pauseTimer();
        timeLeft = durations[currentMode];
        updateUI();
        updatePlayPauseIcon(false);
      }
      
      function handleSessionComplete() {
        // confetti + haptic (optional)
        confettiEffect();
        if (navigator.vibrate) navigator.vibrate(200);
        
        if (currentMode === 'focus') {
          // focus finished: add minutes to total
          const focusMinutes = durations.focus / 60;
          totalFocusMinutes += focusMinutes;
          completedSessions++;
          updateUI();
          // decide next mode
          if (completedSessions % sessionsTarget === 0) {
            switchMode('longBreak', true);
          } else {
            switchMode('shortBreak', true);
          }
        } else {
          // break finished: back to focus
          switchMode('focus', true);
        }
        // auto stop running state (timer already stopped)
        updatePlayPauseIcon(false);
      }
      
      function skipForward() {
        if (isRunning) pauseTimer();
        // complete current session artificially
        if (currentMode === 'focus') {
          totalFocusMinutes += durations.focus / 60;
          completedSessions++;
          updateUI();
          if (completedSessions % sessionsTarget === 0) {
            switchMode('longBreak', true);
          } else {
            switchMode('shortBreak', true);
          }
        } else {
          // break skip -> focus
          switchMode('focus', true);
        }
      }
      
      function skipBack() {
        if (isRunning) pauseTimer();
        resetCurrentTimer();
      }
      
      function updatePlayPauseIcon(isPlaying) {
        const svg = startPauseBtn.querySelector('svg');
        if (isPlaying) {
          // pause icon
          svg.innerHTML = '<rect x="6" y="4" width="4" height="16" rx="1" stroke="none" fill="currentColor"/><rect x="14" y="4" width="4" height="16" rx="1" stroke="none" fill="currentColor"/>';
          svg.setAttribute('viewBox', '0 0 24 24');
        } else {
          // play icon
          svg.innerHTML = '<path d="M8 5v14l11-7z" stroke="currentColor" stroke-width="2" fill="none"/>';
          svg.setAttribute('viewBox', '0 0 24 24');
        }
      }
      
      // confetti burst
      function confettiEffect() {
        for (let i = 0; i < 70; i++) {
          const conf = document.createElement('div');
          conf.className = 'confetti';
          conf.style.left = Math.random() * 100 + 'vw';
          conf.style.background = `hsl(${Math.random() * 360}, 100%, 60%)`;
          conf.style.animationDuration = 2 + Math.random() * 2 + 's';
          conf.style.width = Math.random() * 8 + 4 + 'px';
          conf.style.height = Math.random() * 12 + 6 + 'px';
          document.body.appendChild(conf);
          setTimeout(() => conf.remove(), 4000);
        }
      }
      
      // load settings from localStorage
      function loadStoredSettings() {
        const saved = localStorage.getItem('pomodoroPro');
        if (saved) {
          try {
            const data = JSON.parse(saved);
            if (data.focus) durations.focus = data.focus * 60;
            if (data.shortBreak) durations.shortBreak = data.shortBreak * 60;
            if (data.longBreak) durations.longBreak = data.longBreak * 60;
            if (data.sessionsTarget) sessionsTarget = data.sessionsTarget;
            focusInput.value = durations.focus / 60;
            shortInput.value = durations.shortBreak / 60;
            longInput.value = durations.longBreak / 60;
            sessionsBeforeLongInput.value = sessionsTarget;
          } catch(e) {}
        }
        // apply durations to current mode
        if (currentMode === 'focus') timeLeft = durations.focus;
        else if (currentMode === 'shortBreak') timeLeft = durations.shortBreak;
        else timeLeft = durations.longBreak;
        updateUI();
      }
      
      function saveAllSettings() {
        const newFocus = parseInt(focusInput.value, 10);
        const newShort = parseInt(shortInput.value, 10);
        const newLong = parseInt(longInput.value, 10);
        const newSessions = parseInt(sessionsBeforeLongInput.value, 10);
        if (!isNaN(newFocus) && newFocus > 0) durations.focus = newFocus * 60;
        if (!isNaN(newShort) && newShort > 0) durations.shortBreak = newShort * 60;
        if (!isNaN(newLong) && newLong > 0) durations.longBreak = newLong * 60;
        if (!isNaN(newSessions) && newSessions > 0) sessionsTarget = newSessions;
        
        localStorage.setItem('pomodoroPro', JSON.stringify({
          focus: durations.focus / 60,
          shortBreak: durations.shortBreak / 60,
          longBreak: durations.longBreak / 60,
          sessionsTarget: sessionsTarget
        }));
        
        // reset current timer according to mode with new durations
        if (currentMode === 'focus') timeLeft = durations.focus;
        else if (currentMode === 'shortBreak') timeLeft = durations.shortBreak;
        else timeLeft = durations.longBreak;
        if (isRunning) pauseTimer();
        updateUI();
        modal.classList.remove('open');
      }
      
      // ---------- Event listeners ----------
      startPauseBtn.addEventListener('click', () => {
        if (isRunning) {
          pauseTimer();
        } else {
          startTimer();
          updatePlayPauseIcon(true);
        }
      });
      
      skipBackBtn.addEventListener('click', () => {
        if (isRunning) pauseTimer();
        skipBack();
      });
      
      skipForwardBtn.addEventListener('click', () => {
        if (isRunning) pauseTimer();
        skipForward();
      });
      
      modeBtns.forEach(btn => {
        btn.addEventListener('click', () => {
          const mode = btn.dataset.mode;
          if (mode === currentMode) return;
          if (isRunning) pauseTimer();
          switchMode(mode, true);
        });
      });
      
      settingsBtn.addEventListener('click', () => {
        // reflect current durations in modal
        focusInput.value = durations.focus / 60;
        shortInput.value = durations.shortBreak / 60;
        longInput.value = durations.longBreak / 60;
        sessionsBeforeLongInput.value = sessionsTarget;
        modal.classList.add('open');
      });
      
      closeModal.addEventListener('click', () => {
        modal.classList.remove('open');
      });
      
      saveSettings.addEventListener('click', saveAllSettings);
      modal.addEventListener('click', (e) => {
        if (e.target === modal) modal.classList.remove('open');
      });
      
      // keyboard shortcuts: spacebar (start/pause), r (reset current)
      window.addEventListener('keydown', (e) => {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
        if (e.code === 'Space' || e.key === ' ') {
          e.preventDefault();
          startPauseBtn.click();
        } else if (e.key === 'r' || e.key === 'R') {
          e.preventDefault();
          if (isRunning) pauseTimer();
          resetCurrentTimer();
        }
      });
      
      // initial load and active mode
      loadStoredSettings();
      switchMode('focus', true);
      updatePlayPauseIcon(false);
      
      // initial progress update
      updateUI();
    })();
  </script>
</body>
</html>
