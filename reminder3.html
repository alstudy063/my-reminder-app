<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyFlow - Multi-Subject Reminders</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-fade-in {
            animation: fadeIn 0.3s ease-out forwards;
        }

        body {
            background-color: #f0f2f5;
            font-family: 'Inter', sans-serif;
            margin-bottom: 80px;
        }

        .app-container {
            max-width: 800px;
            min-height: 100vh;
            background: white;
            margin: 0 auto;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 800px;
            background: white;
            border-top: 1px solid #e5e7eb;
            display: flex;
            justify-content: space-around;
            align-items: center;
            height: 70px;
            z-index: 1000;
            box-shadow: 0 -4px 10px rgba(0,0,0,0.05);
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #9ca3af;
            cursor: pointer;
            transition: color 0.2s;
            flex: 1;
        }

        .nav-item.active {
            color: #4F46E5;
        }

        .add-btn-special {
            background: #4F46E5;
            color: white !important;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: -30px;
            box-shadow: 0 4px 14px rgba(79, 70, 229, 0.4);
            transition: transform 0.2s;
        }

        .urgent-card {
            border-left: 4px solid #e74c3c;
            background-color: #fef2f2;
        }

        .progress-circle {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .progress-circle::before {
            content: "";
            position: absolute;
            width: 80px;
            height: 80px;
            background: #0d1117;
            border-radius: 50%;
        }

        .progress-text {
            position: relative;
            z-index: 10;
            color: white;
            font-weight: bold;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1040;
            backdrop-filter: blur(4px);
        }

        .modal-content {
            background: white;
            border-radius: 1rem;
            width: 90%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
        }

        @media (min-width: 768px) {
            .app-container { max-width: 100%; }
            .bottom-nav { max-width: 600px; border-radius: 20px 20px 0 0; }
        }
    </style>
</head>
<body>

    <!-- Login Section -->
    <div id="loginScreen" class="fixed inset-0 bg-slate-900 flex items-center justify-center z-[2000] p-4">
        <div class="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-sm animate-fade-in text-center">
            <div class="mb-8">
                <div class="w-16 h-16 bg-indigo-600 rounded-2xl mx-auto flex items-center justify-center mb-4 shadow-lg shadow-indigo-200">
                    <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
                </div>
                <h2 class="text-3xl font-bold text-slate-800">StudyFlow</h2>
                <p class="text-slate-500 mt-2">Sign in to save your progress</p>
            </div>
            
            <button id="googleSignInBtn" class="w-full flex items-center justify-center gap-3 bg-white border border-gray-300 py-3 rounded-lg font-semibold text-gray-700 hover:bg-gray-50 transition transform active:scale-95 shadow-sm">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/02/2x/google_light.png" class="w-5 h-5" alt="Google">
                Continue with Google
            </button>
            
            <div id="authStatus" class="mt-4 text-xs text-red-500 hidden"></div>
        </div>
    </div>

    <!-- Main App Content -->
    <div id="appBody" class="app-container hidden pb-24">
        <header class="p-6 border-b flex flex-col md:flex-row justify-between items-center gap-4">
            <div>
                <h1 class="text-2xl font-bold text-gray-800">Study Reminders</h1>
                <p class="text-gray-500" id="userGreeting">Loading profile...</p>
            </div>
            <select id="subjectFilter" class="px-4 py-2 border rounded-lg bg-gray-50 outline-none focus:ring-2 focus:ring-indigo-500">
                <option value="All">All Subjects</option>
                <option value="Biology">Biology</option>
                <option value="Physics">Physics</option>
                <option value="Chemistry">Chemistry</option>
            </select>
        </header>

        <main id="reminderGrid" class="p-6 grid grid-cols-1 md:grid-cols-2 gap-4"></main>

        <nav class="bottom-nav">
            <div class="nav-item active" onclick="switchTab('home')">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg>
                <span class="text-xs mt-1">Home</span>
            </div>
            <div class="nav-item" onclick="openModal('addModal')">
                <div class="add-btn-special">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" /></svg>
                </div>
                <span class="text-xs mt-1">Add</span>
            </div>
            <div class="nav-item" onclick="openModal('progressModal')">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" /></svg>
                <span class="text-xs mt-1">Progress</span>
            </div>
            <div class="nav-item" onclick="openModal('profileModal')">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
                <span class="text-xs mt-1">Profile</span>
            </div>
        </nav>
    </div>

    <!-- Modals -->
    <div id="addModal" class="modal-overlay">
        <div class="modal-content p-6 animate-fade-in">
            <h2 class="text-xl font-bold mb-4">New Study Session</h2>
            <form id="addForm" class="space-y-4">
                <input type="text" id="topicName" required class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="Topic Name">
                <select id="topicSubject" class="w-full px-3 py-2 border rounded-lg">
                    <option>Biology</option><option>Physics</option><option>Chemistry</option>
                </select>
                <input type="date" id="topicDate" required class="w-full px-3 py-2 border rounded-lg">
                <textarea id="topicNotes" rows="3" class="w-full px-3 py-2 border rounded-lg" placeholder="Notes..."></textarea>
                <div class="flex gap-2">
                    <button type="button" onclick="closeModal('addModal')" class="flex-1 py-2 bg-gray-100 rounded-lg">Cancel</button>
                    <button type="submit" class="flex-1 py-2 bg-indigo-600 text-white rounded-lg">Save</button>
                </div>
            </form>
        </div>
    </div>

    <div id="progressModal" class="modal-overlay">
        <div class="modal-content p-6 bg-[#0d1117] text-white animate-fade-in">
            <h2 class="text-xl font-bold mb-6">Progress Tracking</h2>
            <div class="grid grid-cols-1 gap-4" id="progressStats"></div>
            <button onclick="closeModal('progressModal')" class="w-full mt-6 py-2 bg-gray-800 rounded-lg">Close</button>
        </div>
    </div>

    <div id="profileModal" class="modal-overlay">
        <div class="modal-content profile-modal animate-fade-in flex flex-col md:flex-row min-h-[400px]">
            <div class="w-full md:w-1/3 bg-gray-50 p-6 flex flex-col items-center justify-between border-b md:border-b-0 md:border-r">
                <div class="text-center">
                    <img id="profilePic" class="w-24 h-24 rounded-full border-4 border-white shadow-md mx-auto mb-4" src="" alt="">
                    <h3 id="profileDisplayName" class="font-bold text-lg text-gray-800">User</h3>
                    <p class="text-xs text-indigo-600 bg-indigo-50 px-2 py-1 rounded inline-block mt-1">Learner Account</p>
                </div>
                <button id="signOutBtn" class="w-full py-2 mt-4 bg-white text-red-500 border border-red-200 rounded-lg hover:bg-red-500 hover:text-white transition">Sign Out</button>
            </div>
            <div class="w-full md:w-2/3 p-6">
                <h4 class="text-sm font-semibold text-gray-400 uppercase tracking-wider mb-4">Account Details</h4>
                <div id="emailDisplay" class="text-sm text-gray-600"></div>
                <div class="mt-4">
                    <p class="text-xs text-gray-400">Total Tasks Completed</p>
                    <p id="totalCompletedDisplay" class="text-xl font-bold text-indigo-600">0</p>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, updateDoc, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
  apiKey: "AIzaSyA9DLfAHTUUGxCPn2j_k6godoTEopzaFAU",
  authDomain: "studymaster-919ba.firebaseapp.com",
  databaseURL: "https://studymaster-919ba-default-rtdb.firebaseio.com",
  projectId: "studymaster-919ba",
  storageBucket: "studymaster-919ba.firebasestorage.app",
  messagingSenderId: "426684063256",
  appId: "1:426684063256:web:52c17625a9450ea9662d6d",
  measurementId: "G-CWQB2330GF"
};

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();
        const appId = "reminder-udara";

        let currentReminders = [];
        let currentProgress = { Biology: 0, Physics: 0, Chemistry: 0 };

        // Auth Logic
        document.getElementById('googleSignInBtn').addEventListener('click', () => {
            signInWithPopup(auth, provider).catch(err => {
                const status = document.getElementById('authStatus');
                status.innerText = "Error: " + err.message;
                status.classList.remove('hidden');
            });
        });

        document.getElementById('signOutBtn').addEventListener('click', () => {
            signOut(auth).then(() => location.reload());
        });

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('appBody').classList.remove('hidden');
                document.getElementById('userGreeting').innerText = `Hello, ${user.displayName}!`;
                document.getElementById('profileDisplayName').innerText = user.displayName;
                document.getElementById('profilePic').src = user.photoURL || '';
                document.getElementById('emailDisplay').innerText = user.email;

                setupRealtimeListeners(user.uid);
            } else {
                document.getElementById('loginScreen').classList.remove('hidden');
                document.getElementById('appBody').classList.add('hidden');
            }
        });

        // Firestore Listeners
        function setupRealtimeListeners(userId) {
            // Reminders
            const remindersRef = collection(db, 'artifacts', appId, 'users', userId, 'reminders');
            onSnapshot(remindersRef, (snapshot) => {
                currentReminders = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderReminders();
                updateProfileStats();
            }, (err) => console.error(err));

            // Progress
            const progressDoc = doc(db, 'artifacts', appId, 'users', userId, 'stats', 'progress');
            onSnapshot(progressDoc, (docSnap) => {
                if (docSnap.exists()) {
                    currentProgress = docSnap.data();
                } else {
                    setDoc(progressDoc, currentProgress);
                }
                updateProgressUI();
            });
        }

        // Globalized Helper Functions
        window.openModal = (id) => {
            document.getElementById(id).style.display = 'flex';
        };
        window.closeModal = (id) => {
            document.getElementById(id).style.display = 'none';
        };

        // CRUD Actions
        document.getElementById('addForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const user = auth.currentUser;
            if (!user) return;

            const reminderData = {
                topic: document.getElementById('topicName').value,
                subject: document.getElementById('topicSubject').value,
                date: document.getElementById('topicDate').value,
                notes: document.getElementById('topicNotes').value,
                completed: false,
                createdAt: Date.now()
            };

            await addDoc(collection(db, 'artifacts', appId, 'users', user.uid, 'reminders'), reminderData);
            closeModal('addModal');
            e.target.reset();
        });

        window.markReviewed = async (docId, subject) => {
            const user = auth.currentUser;
            if (!user) return;

            const reminderRef = doc(db, 'artifacts', appId, 'users', user.uid, 'reminders', docId);
            await updateDoc(reminderRef, { completed: true });

            // Update Progress
            const progressRef = doc(db, 'artifacts', appId, 'users', user.uid, 'stats', 'progress');
            const newVal = Math.min(100, (currentProgress[subject] || 0) + 5);
            await updateDoc(progressRef, { [subject]: newVal });
        };

        function renderReminders() {
            const grid = document.getElementById('reminderGrid');
            const filter = document.getElementById('subjectFilter').value;
            const today = new Date().toISOString().split('T')[0];
            
            grid.innerHTML = '';
            const filtered = currentReminders.filter(r => (filter === 'All' || r.subject === filter) && !r.completed);

            if (filtered.length === 0) {
                grid.innerHTML = '<div class="col-span-full text-center py-10 text-gray-400">No active tasks. Tap "+" to start!</div>';
                return;
            }

            filtered.forEach(r => {
                const isUrgent = r.date === today;
                const card = document.createElement('div');
                card.className = `p-5 rounded-xl border bg-white shadow-sm animate-fade-in ${isUrgent ? 'urgent-card' : ''}`;
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-2">
                        <span class="text-xs font-bold px-2 py-1 rounded ${getSubjectColor(r.subject)}">${r.subject}</span>
                        ${isUrgent ? '<span class="text-xs font-bold text-red-500 uppercase">Due Today</span>' : `<span class="text-xs text-gray-400">${r.date}</span>`}
                    </div>
                    <h3 class="font-bold text-gray-800 text-lg">${r.topic}</h3>
                    <p class="text-sm text-gray-500 mt-2 mb-4 line-clamp-2">${r.notes || ''}</p>
                    <button onclick="markReviewed('${r.id}', '${r.subject}')" class="w-full py-2 bg-gray-50 border rounded-lg text-sm font-semibold hover:bg-indigo-600 hover:text-white transition">Mark Reviewed</button>
                `;
                grid.appendChild(card);
            });
        }

        function getSubjectColor(subj) {
            const colors = { Biology: 'bg-green-100 text-green-700', Physics: 'bg-blue-100 text-blue-700', Chemistry: 'bg-purple-100 text-purple-700' };
            return colors[subj] || 'bg-gray-100 text-gray-700';
        }

        function updateProgressUI() {
            const container = document.getElementById('progressStats');
            if (!container) return;
            container.innerHTML = '';
            const colors = { Biology: '#10b981', Physics: '#3b82f6', Chemistry: '#8b5cf6' };

            Object.keys(currentProgress).forEach(subj => {
                const percent = currentProgress[subj] || 0;
                const item = document.createElement('div');
                item.className = 'flex items-center gap-6 bg-gray-800 p-4 rounded-xl';
                item.innerHTML = `
                    <div class="progress-circle" style="background: conic-gradient(${colors[subj]} ${percent * 3.6}deg, #1f2937 0deg)">
                        <span class="progress-text">${percent}%</span>
                    </div>
                    <div><h4 class="text-lg font-bold">${subj}</h4><p class="text-sm text-gray-400">Mastery Level</p></div>
                `;
                container.appendChild(item);
            });
        }

        function updateProfileStats() {
            const count = currentReminders.filter(r => r.completed).length;
            const el = document.getElementById('totalCompletedDisplay');
            if (el) el.innerText = count;
        }

        document.getElementById('subjectFilter').addEventListener('change', renderReminders);

        // Global tab highlight
        window.switchTab = (tab) => {
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            if(tab === 'home') document.querySelectorAll('.nav-item')[0].classList.add('active');
        };
    </script>
</body>
</html>
